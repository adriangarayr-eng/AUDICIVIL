<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUDICIVIL | Auditorio Ricardo Ramiro Santos Rodríguez</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    /* Cabecera estilo cine */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      border-bottom: 3px solid #c8102e;
      padding: 1.5rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .logo h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 3.5rem;
      color: #c8102e;
      letter-spacing: 5px;
      line-height: 1;
    }

    .logo p {
      font-size: 0.9rem;
      color: #ccc;
      margin-top: 0.2rem;
    }

    .admin-btn {
      background: transparent;
      border: 2px solid #c8102e;
      color: #c8102e;
      padding: 0.5rem 1.5rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.3rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .admin-btn:hover {
      background: #c8102e;
      color: #fff;
    }

    /* Contenedor principal */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Sección de administración (oculta por defecto) */
    .admin-panel {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2.5rem;
      display: none;
    }

    .admin-panel.active {
      display: block;
    }

    .admin-panel h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.2rem;
      color: #c8102e;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem;
      background: #262626;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
    }

    input[type="file"] {
      padding: 0.5rem;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-submit {
      background: #c8102e;
      color: #fff;
      border: none;
      padding: 0.8rem 2.5rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.3rem;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 0.8rem;
    }

    .btn-submit:hover {
      background: #e0123a;
    }

    .logout-btn {
      background: transparent;
      border: 2px solid #c8102e;
      color: #c8102e;
      padding: 0.4rem 1.2rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      margin-left: 1rem;
      border-radius: 20px;
    }

    /* Título de sección de eventos */
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.5rem;
      color: #fff;
      border-left: 6px solid #c8102e;
      padding-left: 1rem;
      margin-bottom: 2rem;
      letter-spacing: 3px;
    }

    /* Grid de tarjetas */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .event-card {
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
    }

    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(200, 16, 46, 0.2);
    }

    .event-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #262626;
    }

    .event-image-placeholder {
      width: 100%;
      height: 220px;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 2rem;
    }

    .event-info {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .event-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      color: #fff;
      letter-spacing: 1px;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      color: #ccc;
      font-size: 0.9rem;
    }

    .event-date, .event-time {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .event-extra {
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: auto;
    }

    .event-status {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 0.8rem;
      align-self: flex-start;
    }

    .status-today {
      background: #c8102e;
      color: #fff;
    }

    .status-future {
      background: #2a5a2a;
      color: #cfc;
    }

    .no-events {
      text-align: center;
      font-size: 1.5rem;
      color: #666;
      grid-column: 1 / -1;
      padding: 4rem 0;
    }

    @media (max-width: 600px) {
      .logo h1 {
        font-size: 2.5rem;
      }
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <h1>AUDICIVIL</h1>
      <p>Auditorio Ricardo Ramiro Santos Rodríguez</p>
      <p>Escuela Profesional de Ingeniería Civil - UNMSM</p>
    </div>
    <button class="admin-btn" id="adminToggle">🔐 Administrar</button>
  </header>

  <div class="container">
    <!-- Panel de administración (se muestra con contraseña) -->
    <div class="admin-panel" id="adminPanel">
      <h2>Agregar nuevo evento</h2>
      <form id="eventForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="titulo">Título del evento</label>
          <input type="text" id="titulo" name="titulo" required>
        </div>
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>
        <div class="form-group">
          <label for="horario">Horario (ej. 10:00 - 12:00)</label>
          <input type="text" id="horario" name="horario" required>
        </div>
        <div class="form-group">
          <label for="info">Información extra</label>
          <textarea id="info" name="info" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="imagen">Imagen de referencia</label>
          <input type="file" id="imagen" name="imagen" accept="image/*">
        </div>
        <button type="submit" class="btn-submit">Guardar evento</button>
        <button type="button" class="logout-btn" id="logoutAdmin">Cerrar panel</button>
      </form>
    </div>

    <!-- Lista de eventos -->
    <h2 class="section-title">📅 Eventos programados</h2>
    <div class="events-grid" id="eventsContainer">
      <p class="no-events">Cargando eventos...</p>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'admin123'; // Cambia esta contraseña al valor que desees

    // Referencias DOM
    const adminToggle = document.getElementById('adminToggle');
    const adminPanel = document.getElementById('adminPanel');
    const logoutBtn = document.getElementById('logoutAdmin');
    const eventForm = document.getElementById('eventForm');
    const eventsContainer = document.getElementById('eventsContainer');

    let isAdmin = false;

    // Mostrar/ocultar panel de administración
    adminToggle.addEventListener('click', () => {
      if (isAdmin) {
        // Si ya está logueado, cerrar sesión
        isAdmin = false;
        adminPanel.classList.remove('active');
        adminToggle.textContent = '🔐 Administrar';
      } else {
        const password = prompt('Ingrese la contraseña de administrador:');
        if (password === ADMIN_PASSWORD) {
          isAdmin = true;
          adminPanel.classList.add('active');
          adminToggle.textContent = '🔓 Cerrar sesión';
        } else if (password !== null) {
          alert('Contraseña incorrecta');
        }
      }
    });

    logoutBtn.addEventListener('click', () => {
      isAdmin = false;
      adminPanel.classList.remove('active');
      adminToggle.textContent = '🔐 Administrar';
    });

    // Función para cargar y mostrar eventos
    async function loadEvents() {
      try {
        const response = await fetch('/api/events');
        const events = await response.json();

        // Filtrar eventos de hoy y futuros
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const filtered = events.filter(ev => {
          const evDate = new Date(ev.fecha + 'T00:00:00');
          return evDate >= today;
        });

        // Ordenar por fecha ascendente
        filtered.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

        renderEvents(filtered);
      } catch (error) {
        console.error('Error cargando eventos:', error);
        eventsContainer.innerHTML = '<p class="no-events">Error al cargar eventos. Intente recargar.</p>';
      }
    }

    function renderEvents(events) {
      if (events.length === 0) {
        eventsContainer.innerHTML = '<p class="no-events">No hay eventos programados próximamente.</p>';
        return;
      }

      const todayStr = new Date().toISOString().split('T')[0];
      let html = '';
      events.forEach(ev => {
        const isToday = ev.fecha === todayStr;
        const statusClass = isToday ? 'status-today' : 'status-future';
        const statusText = isToday ? 'HOY' : 'PRÓXIMAMENTE';

        html += `
          <div class="event-card">
            ${ ev.imagen 
              ? `<img src="${ev.imagen}" alt="${ev.titulo}" class="event-image" onerror="this.parentElement.innerHTML='<div class=\\'event-image-placeholder\\'>🖼️</div>';">` 
              : '<div class="event-image-placeholder">🖼️</div>' 
            }
            <div class="event-info">
              <h3 class="event-title">${ev.titulo}</h3>
              <div class="event-meta">
                <div class="event-date">📅 ${formatDate(ev.fecha)}</div>
                <div class="event-time">🕒 ${ev.horario}</div>
              </div>
              ${ ev.info ? `<p class="event-extra">${ev.info}</p>` : '' }
              <span class="event-status ${statusClass}">${statusText}</span>
            </div>
          </div>
        `;
      });
      eventsContainer.innerHTML = html;
    }

    function formatDate(dateStr) {
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('es-PE', options);
    }

    // Enviar formulario para crear evento
    eventForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(eventForm);
      // Validaciones básicas
      if (!formData.get('titulo') || !formData.get('fecha') || !formData.get('horario')) {
        alert('Por favor complete los campos obligatorios: título, fecha y horario.');
        return;
      }

      try {
        const response = await fetch('/api/events', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Error al crear evento');
        }

        alert('Evento creado exitosamente');
        eventForm.reset();
        loadEvents(); // Recargar lista
      } catch (error) {
        console.error('Error:', error);
        alert('Error: ' + error.message);
      }
    });

    // Cargar eventos al iniciar
    loadEvents();

    // Recargar automáticamente cada 30 segundos para reflejar cambios de otros usuarios
    setInterval(loadEvents, 30000);
  </script>
</body>
</html>
